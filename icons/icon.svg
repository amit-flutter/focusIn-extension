<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f172a" />
      <stop offset="100%" stop-color="#1e293b" />
    </linearGradient>

    <!-- Shield/Target Gradient -->
    <linearGradient id="shield-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1d4ed8" />
      <stop offset="100%" stop-color="#0369a1" />
    </linearGradient>

    <!-- Neon Cyan Accent Gradient -->
    <linearGradient id="neon-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#06b6d4" />
      <stop offset="100%" stop-color="#06f2d4" />
    </linearGradient>

    <!-- Glow Filter -->
    <filter id="neon-glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <!-- Base Card (Rounded Square) -->
  <rect width="512" height="512" rx="112" fill="url(#bg-grad)" />

  <!-- Shield Base -->
  <path d="M256,64 C320,64 380,84 416,112 C416,256 360,380 256,448 C152,380 96,256 96,112 C132,84 192,64 256,64 Z" 
        fill="url(#shield-grad)" 
        stroke="#3b82f6" 
        stroke-width="8" 
        opacity="0.85" />

  <!-- Target Rings (Concentric Circles) -->
  <circle cx="256" cy="256" r="110" fill="none" stroke="url(#neon-grad)" stroke-width="12" filter="url(#neon-glow)" />
  <circle cx="256" cy="256" r="70" fill="none" stroke="#ffffff" stroke-width="8" stroke-dasharray="8 8" opacity="0.7" />
  <circle cx="256" cy="256" r="30" fill="url(#neon-grad)" />

  <!-- Focus Arrow (Pointing Top-Right / Growth) -->
  <g filter="url(#neon-glow)">
    <line x1="256" y1="256" x2="370" y2="142" stroke="url(#neon-grad)" stroke-width="16" stroke-linecap="round" />
    <path d="M310,142 L370,142 L370,202" fill="none" stroke="url(#neon-grad)" stroke-width="16" stroke-linecap="round" stroke-linejoin="round" />
  </g>

  <!-- Dynamic Outer Scope Border -->
  <circle cx="256" cy="256" r="160" fill="none" stroke="#38bdf8" stroke-width="4" stroke-dasharray="20 10" opacity="0.4" />
</svg>
